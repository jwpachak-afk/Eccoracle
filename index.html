<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecco Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#000d1a;display:flex;align-items:center;justify-content:center;font-family:'Crimson Text',Georgia,serif;padding:20px;overflow-x:hidden;}
canvas#ocean{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.55;}
.shell{position:relative;z-index:2;max-width:520px;width:100%;text-align:center;}
@keyframes pulse{0%,100%{filter:drop-shadow(0 0 8px #4dc8f0) drop-shadow(0 0 24px #0a6fa0);}50%{filter:drop-shadow(0 0 18px #7ee8ff) drop-shadow(0 0 48px #1aa8d8);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes fadein{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%,100%{opacity:0.5;}50%{opacity:1;}}
.dolphin-wrap{animation:float 4s ease-in-out infinite;margin-bottom:8px;}
.dolphin-wrap svg{animation:pulse 3s ease-in-out infinite;}
h1{font-family:'Cinzel',serif;color:#7ee8ff;font-size:28px;letter-spacing:6px;font-weight:400;text-shadow:0 0 30px #4dc8f088;margin-bottom:4px;}
.subtitle{color:#4dc8f0;font-size:13px;letter-spacing:4px;font-style:italic;opacity:0.7;margin-bottom:32px;}
.card{background:linear-gradient(160deg,#040f1e,#010810);border:1px solid #1a4a6a;border-radius:12px;padding:28px 32px;margin-bottom:24px;box-shadow:0 0 40px #000a,inset 0 0 30px #0a2a4a22;}
label{display:block;color:#4dc8f0;font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;margin-bottom:10px;opacity:0.8;}
textarea{width:100%;background:#010810;border:1px solid #1a4a6a;border-radius:6px;color:#c8eaf8;font-family:'Crimson Text',Georgia,serif;font-size:16px;padding:12px 14px;resize:none;height:80px;outline:none;line-height:1.5;transition:border-color 0.3s;}
textarea::placeholder{color:#1a4a6a;}
textarea:focus{border-color:#4dc8f0;}
.ask-btn{width:100%;margin-top:12px;background:linear-gradient(135deg,#0a3a5a,#061828);border:1px solid #2a7aaa;border-radius:6px;color:#7ee8ff;font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;padding:12px;cursor:pointer;transition:all 0.3s;}
.ask-btn:hover{border-color:#4dc8f0;box-shadow:0 0 20px #4dc8f022;}
.ask-btn:disabled{opacity:0.4;cursor:not-allowed;}
.response-area{display:none;animation:fadein 0.8s ease;}
.response-area.visible{display:block;}
.response-text{color:#c8eaf8;font-size:19px;font-style:italic;line-height:1.8;text-shadow:0 0 20px #4dc8f044;}
.response-text em{color:#7ee8ff;display:block;margin-top:10px;font-size:15px;opacity:0.8;}
.response-mode{margin-top:10px;color:#4dc8f0;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;opacity:0.6;animation:shimmer 3s infinite;}
.loading{color:#4dc8f0;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;animation:shimmer 1s infinite;}
.divider{width:60%;margin:0 auto 24px;border:none;border-top:1px solid #1a4a6a44;}
.glyphs{display:flex;justify-content:center;gap:20px;margin-bottom:24px;opacity:0.3;}
.glyph{color:#4dc8f0;font-size:20px;animation:shimmer 3s infinite;}
.glyph:nth-child(2){animation-delay:1s;}
.glyph:nth-child(3){animation-delay:2s;}
footer{color:#1a4a6a;font-size:11px;letter-spacing:2px;font-family:'Cinzel',serif;}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
//   PASTE YOUR ANTHROPIC API KEY BETWEEN THE QUOTES
const API_KEY = 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;
// ═══════════════════════════════════════════════════

const SYSTEM = `You are the Ecco Oracle — an ancient mysterious voice from the deepest ocean, channelled through Ecco the dolphin. You speak in the spirit of the Ecco the Dolphin video game series: cosmic, eerie, wise, playful and strange. When a user asks anything you respond as the Oracle. Your answers should be cryptic but meaningful like a prophecy or koan. Draw on ocean imagery, time, stars, ancient memory, sonar, migration, tides, the Vortex, the Atlanteans, deep creatures. Sometimes be playful and surprising, sometimes deeply eerie. Be 2-5 sentences. Occasionally reference Ecco's journey, the Metasphere, the Asterite, or time itself. Never break character. End with a short whisper in *asterisks*.`;

const MODES = ["PROPHECY","VISION FROM THE DEEP","THE ASTERITE SPEAKS","SONAR ECHO","ANCIENT MEMORY","THE VORTEX WHISPERS"];

const FALLBACKS = [
  "The ocean has heard this question before, in another age. The answer swims beneath your certainty, waiting to surface when the tide turns. Look not ahead but inward — the deep knows no difference between the two. <em>~ the waters remember ~</em>",
  "Three currents cross at the place you seek. One carries what you fear, one carries what you want, one carries what you need. Only the one who dives deepest will know which is which. <em>~ dive, always dive ~</em>",
  "The Asterite has witnessed ten thousand versions of this moment. In most of them the answer was already known to the one who asked. Trust the sonar of your own heart. <em>~ the echo returns ~</em>",
  "Time is not a line. It is a vast ocean and you are swimming in all directions at once. What you call the future has already left its ripples in the present. <em>~ follow the light below ~</em>",
  "Even the great creatures of the abyss must sleep. Even the tides must rest. Your answer waits in the stillness between one wave and the next. <em>~ be still, and hear ~</em>",
  "The ancients encoded this question into the song of the sea. The Metasphere hums with it still. You are not lost — you are exactly where the current intended. <em>~ all rivers reach the sea ~</em>",
];

async function askOracle(){
  const q = document.getElementById('question').value.trim();
  if(!q) return;
  const btn = document.getElementById('askBtn');
  const area = document.getElementById('responseArea');
  const text = document.getElementById('responseText');
  const mode = document.getElementById('responseMode');
  btn.disabled = true;
  area.classList.add('visible');
  text.innerHTML = '<span class="loading">~ reading the tides ~</span>';
  mode.textContent = MODES[Math.floor(Math.random()*MODES.length)];

  if(API_KEY === "YOUR_API_KEY_HERE"){
    setTimeout(()=>{ text.innerHTML = FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)]; btn.disabled=false; }, 1400);
    return;
  }

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:SYSTEM,messages:[{role:"user",content:q}]})
    });
    const data = await res.json();
    if(data.content && data.content[0]){
      text.innerHTML = data.content[0].text.replace(/\*(.*?)\*/g,'<em>$1</em>');
    } else {
      text.innerHTML = FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)];
    }
  } catch(e){
    text.innerHTML = FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)];
  }
  btn.disabled = false;
}

document.getElementById('question').addEventListener('keydown',e=>{ if(e.key==='Enter'&&e.ctrlKey) askOracle(); });

// Animated ocean background
const canvas = document.getElementById('ocean');
const ctx = canvas.getContext('2d');
let W, H;
const waves = [
  {oy:0.4,speed:0.0003,amp:20,phase:0,  col:"rgba(10,50,100,0.18)"},
  {oy:0.5,speed:0.0004,amp:16,phase:1.2,col:"rgba(10,60,110,0.14)"},
  {oy:0.6,speed:0.0005,amp:12,phase:2.4,col:"rgba(15,70,120,0.12)"},
  {oy:0.7,speed:0.0006,amp:10,phase:3.6,col:"rgba(20,80,130,0.10)"},
];
const pts = Array.from({length:70},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,s:0.08+Math.random()*0.18,d:Math.random()*0.2-0.1,o:Math.random()*0.35+0.08}));
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);
let t=0;
(function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000d1a'; ctx.fillRect(0,0,W,H);
  waves.forEach(w=>{
    ctx.beginPath(); ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=6){
      const y=w.oy*H+Math.sin(x*0.007+t*w.speed*1000+w.phase)*w.amp+Math.sin(x*0.018+t*w.speed*600)*w.amp*0.35;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H); ctx.closePath();
    ctx.fillStyle=w.col; ctx.fill();
  });
  pts.forEach(p=>{
    p.y-=p.s/H; p.x+=p.d/W;
    if(p.y<0){p.y=1;p.x=Math.random();}
    ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(77,200,240,${p.o})`; ctx.fill();
  });
  t+=0.016;
  requestAnimationFrame(loop);
})();
</script>
